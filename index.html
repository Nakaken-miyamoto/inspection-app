<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>建築工事 完成時 社内検査項目【完全版】</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<style>
:root{
  --pri:#1a5276;--pri-l:#2980b9;--acc:#e74c3c;--ok:#27ae60;--warn:#f39c12;
  --bg:#f0f2f5;--card:#fff;--bdr:#dce1e6;--tx:#2c3e50;--tx-l:#7f8c8d;
  --grad:linear-gradient(135deg,#1a5276 0%,#2980b9 100%);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Hiragino Kaku Gothic ProN','Meiryo',sans-serif;background:var(--bg);color:var(--tx);line-height:1.6}

/* ===== HEADER ===== */
.hd{background:var(--grad);color:#fff;padding:16px 0;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.hd .wrap{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.hd h1{font-size:1.2rem;letter-spacing:.5px}
.hd .sub{font-size:.75rem;opacity:.8;margin-top:2px}
.wrap{max-width:1280px;margin:0 auto;padding:0 16px}

/* ===== PROJECT INFO ===== */
.pinfo{background:var(--card);border-radius:12px;padding:20px 24px;margin:16px auto;max-width:1280px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.pinfo h2{font-size:1rem;color:var(--pri);margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid var(--pri)}
.ig{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
.ig label{font-size:.72rem;font-weight:700;color:var(--tx-l);text-transform:uppercase;letter-spacing:.5px}
.ig input{padding:8px 10px;border:1px solid var(--bdr);border-radius:6px;font-size:.9rem;width:100%}
.ig input:focus{outline:none;border-color:var(--pri-l);box-shadow:0 0 0 3px rgba(41,128,185,.1)}

/* ===== PROGRESS ===== */
.prog{max-width:1280px;margin:0 auto 8px;padding:0 16px}
.pbar-wrap{background:#dde4ea;border-radius:20px;height:26px;overflow:hidden;position:relative}
.pbar{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--ok),#2ecc71);transition:width .5s;display:flex;align-items:center;justify-content:center;min-width:50px}
.pbar span{color:#fff;font-size:.72rem;font-weight:700}
.pstats{display:flex;justify-content:space-between;margin-top:6px;font-size:.74rem;color:var(--tx-l);flex-wrap:wrap;gap:4px}
.sb{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:10px;font-weight:600;font-size:.72rem}
.sb-p{background:#d5f5e3;color:#1e8449}.sb-f{background:#fadbd8;color:#c0392b}
.sb-n{background:#fdebd0;color:#d68910}.sb-u{background:#e8e8e8;color:#666}

/* ===== TABS ===== */
.tab-area{max-width:1280px;margin:0 auto;padding:0 16px}
.tab-nav{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:0;padding:4px 0;position:sticky;top:58px;z-index:100;background:var(--bg);padding-top:8px;padding-bottom:8px}
.tab-btn{padding:8px 14px;border:2px solid transparent;border-bottom:none;border-radius:8px 8px 0 0;font-size:.75rem;font-weight:700;cursor:pointer;transition:all .2s;background:#e0e5eb;color:var(--tx-l);white-space:nowrap;position:relative}
.tab-btn:hover{background:#d0d8e0;color:var(--tx)}
.tab-btn.active{background:var(--pri);color:#fff;border-color:var(--pri)}
.tab-btn .tb-badge{display:inline-block;background:rgba(255,255,255,.25);padding:0 6px;border-radius:8px;font-size:.65rem;margin-left:4px}
.tab-btn.active .tb-badge{background:rgba(255,255,255,.3)}
.tab-btn .tb-status{position:absolute;top:-4px;right:-4px;width:10px;height:10px;border-radius:50%;border:2px solid var(--bg)}
.tb-status.complete{background:var(--ok)}.tb-status.incomplete{background:var(--warn)}.tb-status.untouched{background:#ccc}

.tab-panel{display:none;background:var(--card);border-radius:0 12px 12px 12px;box-shadow:0 2px 8px rgba(0,0,0,.06);overflow:hidden}
.tab-panel.active{display:block}

/* ===== SECTION ===== */
.sec-hd{background:linear-gradient(90deg,#eaf2f8,#f5f8fb);padding:10px 20px;font-size:.88rem;font-weight:700;color:var(--pri);border-bottom:1px solid var(--bdr);border-top:1px solid var(--bdr)}

/* ===== ITEM CARD ===== */
.item-card{padding:14px 20px;border-bottom:1px solid #eef1f5;transition:background .15s}
.item-card:hover{background:#fafbfd}
.item-card:last-child{border-bottom:none}
.ic-top{display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap}
.ic-no{background:var(--pri);color:#fff;font-size:.7rem;font-weight:700;padding:3px 10px;border-radius:12px;white-space:nowrap;margin-top:2px;min-width:50px;text-align:center}
.ic-body{flex:1;min-width:200px}
.ic-cat{font-weight:700;font-size:.9rem;color:var(--pri);margin-bottom:2px}
.ic-desc{font-size:.82rem;color:#555;line-height:1.55}

/* ===== POINT BOX ===== */
.ic-point{margin-top:8px;background:linear-gradient(135deg,#fffbeb,#fef9e7);border:1px solid #f9e79f;border-radius:8px;padding:10px 14px;font-size:.78rem;color:#7d6608;line-height:1.55}
.ic-point::before{content:'💡 検査ポイント';display:block;font-weight:700;font-size:.72rem;color:#b7950b;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}

/* ===== RADIO JUDGMENT ===== */
.ic-judge{display:flex;align-items:center;gap:6px;margin-top:10px;flex-wrap:wrap}
.rg{display:flex;gap:0;border-radius:8px;overflow:hidden;border:2px solid var(--bdr)}
.rg label{padding:7px 16px;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s;user-select:none;display:flex;align-items:center;gap:4px;border-right:1px solid var(--bdr)}
.rg label:last-child{border-right:none}
.rg input{display:none}
.rg label:hover{background:#eef3f8}
.rg input:checked+span{} /* handled by JS class */
.rg label.sel-pass{background:#d5f5e3;color:#1e8449;border-color:#a9dfbf}
.rg label.sel-fail{background:#fadbd8;color:#c0392b;border-color:#f5b7b1}
.rg label.sel-na{background:#fdebd0;color:#d68910;border-color:#fad7a0}

.ic-remarks{margin-top:8px;display:flex;align-items:flex-start;gap:8px}
.ic-remarks label{font-size:.72rem;font-weight:600;color:var(--tx-l);white-space:nowrap;padding-top:8px}
.ic-remarks textarea{flex:1;padding:7px 10px;border:1px solid var(--bdr);border-radius:6px;font-size:.82rem;resize:vertical;min-height:34px;font-family:inherit}
.ic-remarks textarea:focus{outline:none;border-color:var(--pri-l)}

/* ===== ACTION BAR ===== */
.abar{position:sticky;bottom:0;background:#fff;border-top:1px solid var(--bdr);padding:10px 0;box-shadow:0 -2px 10px rgba(0,0,0,.08);z-index:199}
.abar .wrap{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.bg{display:flex;gap:8px;flex-wrap:wrap}
.btn{padding:9px 18px;border:none;border-radius:8px;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:5px}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.15)}
.btn:active{transform:translateY(0)}
.b-xl{background:#217346;color:#fff}.b-cv{background:var(--pri-l);color:#fff}
.b-ap{background:var(--ok);color:#fff}.b-rs{background:#95a5a6;color:#fff}

/* ===== TOAST ===== */
.toast{position:fixed;bottom:70px;right:20px;background:#2c3e50;color:#fff;padding:12px 22px;border-radius:8px;font-size:.85rem;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.2);transform:translateX(400px);transition:transform .4s;z-index:300}
.toast.show{transform:translateX(0)}

/* ===== FOOTER ===== */
.ft{text-align:center;padding:20px;color:var(--tx-l);font-size:.72rem}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  .hd h1{font-size:.95rem}
  .ig{grid-template-columns:1fr}
  .tab-btn{font-size:.68rem;padding:6px 10px}
  .ic-top{flex-direction:column;gap:6px}
  .rg label{padding:6px 10px;font-size:.72rem}
  .btn{padding:7px 12px;font-size:.75rem}
  .tab-nav{top:52px}
}
@media print{.hd,.abar,.toast,.tab-nav{display:none}.tab-panel{display:block!important}}
</style>
</head>
<body>

<header class="hd"><div class="wrap">
  <div><h1>建築工事 完成時 社内検査項目【完全版】</h1><div class="sub">引渡し許可判定 統合チェックリスト</div></div>
  <div style="font-size:.72rem;opacity:.8;text-align:right"><div id="curDate"></div></div>
</div></header>

<!-- PROJECT INFO -->
<div class="pinfo wrap" style="padding:20px 24px">
  <h2>📋 工事概要情報</h2>
  <div class="ig">
    <div><label>工事名</label><input type="text" id="f_pn" placeholder="例：○○ビル新築工事"></div>
    <div><label>工期</label><input type="text" id="f_cp" placeholder="例：2025/4/1〜2026/3/31"></div>
    <div><label>社内検査日</label><input type="date" id="f_id"></div>
    <div><label>引渡日</label><input type="date" id="f_dd"></div>
    <div><label>工事担当者名</label><input type="text" id="f_mn" placeholder="例：山田太郎"></div>
    <div><label>検査責任者名</label><input type="text" id="f_in" placeholder="例：佐藤次郎"></div>
  </div>
</div>

<!-- PROGRESS -->
<div class="prog">
  <div class="pbar-wrap"><div class="pbar" id="pbar" style="width:0%"><span id="ptxt">0%</span></div></div>
  <div class="pstats">
    <div>
      <span class="sb sb-p" id="sp">✔ 合格: 0</span>
      <span class="sb sb-f" id="sf">✘ 不合格: 0</span>
      <span class="sb sb-n" id="sn">— 対象外: 0</span>
      <span class="sb sb-u" id="su">○ 未判定: 0</span>
    </div>
    <div>全 <strong id="stot">0</strong> 項目</div>
  </div>
</div>

<!-- TAB AREA -->
<div class="tab-area">
  <div class="tab-nav" id="tabNav"></div>
  <div id="tabPanels"></div>
</div>

<!-- ACTION BAR -->
<div class="abar"><div class="wrap">
  <div class="bg">
    <button class="btn b-xl" onclick="exportExcel()">📊 Excel出力</button>
    <button class="btn b-cv" onclick="exportCSV()">📄 CSV出力</button>
  </div>
  <div class="bg">
    <button class="btn b-ap" onclick="setAllPass()">✔ 全て合格</button>
    <button class="btn b-rs" onclick="resetAll()">🔄 リセット</button>
  </div>
</div></div>

<div class="toast" id="toast"></div>
<div class="ft">建築工事 完成時 社内検査項目【完全版】─ 引渡し許可判定 統合チェックリスト</div>

<script>
// ===================================================================
//  DATA (12 Chapters - with inspection points)
// ===================================================================
const DATA=[
{ch:"第1章",tt:"検査前提条件の確認",icon:"🚦",secs:[{nm:"",items:[
{no:"1-1",cat:"協力会社の自主検査完了",desc:"全協力会社から自主検査記録書が提出され、指摘事項が是正完了しているか",point:"協力会社ごとの検査記録書を一覧表で管理し、提出状況・是正状況を見える化する。未提出の業者がないか必ず確認する"},
{no:"1-2",cat:"残工事リストの確認",desc:"残工事リストが作成され、全項目が完了（ゼロ）であるか",point:"残工事リストは建築・電気・機械の各工種別に作成し、完了日と確認者を明記する。ゼロにならない場合は理由と完了見通しを記録する"},
{no:"1-3",cat:"中間検査指摘事項の是正完了",desc:"中間検査（社内・法定とも）で指摘された事項の是正が全て完了し、記録が残されているか",point:"中間検査の指摘台帳と是正写真を照合する。特に隠蔽部の指摘は写真記録が唯一の証拠となるため重点確認する"},
{no:"1-4",cat:"検査体制の確認",desc:"検査員・受検者・協力業者の体制と日程が確定しているか",point:"検査員が受検者（施工担当）と同一人物にならないよう、第三者性を確保する。検査員の資格・経験も確認する"},
{no:"1-5",cat:"検査道具・機器の準備",desc:"測定機器（水平器・照度計・風速計・騒音計等）、記録シート、カメラが準備されているか",point:"測定機器の校正証明書の有効期限を事前に確認する。期限切れの機器による測定は無効となる"},
{no:"1-6",cat:"検査工程の確認",desc:"社内検査→是正→再検査→消防検査→建築確認完了検査→施主検査→引渡し の工程が周知されているか",point:"各検査間に十分な是正期間を確保する。特に消防検査と建築確認完了検査の間隔は最低3日以上空けることを推奨"}
]}]},
{ch:"第2章",tt:"建築工事の施工品質検査",icon:"🏗️",secs:[
{nm:"2-1 共通事項",items:[
{no:"2-1-1",cat:"形状・寸法・数量",desc:"各部の形状・寸法・数量が設計図書どおりか",point:"主要室の対角寸法を計測し、矩（かね）の精度を確認する。許容誤差は一般部で±3mm、仕上部で±2mm"},
{no:"2-1-2",cat:"施工方法・仕上材",desc:"各部の施工方法および仕上材が仕様書どおりか",point:"仕上表と現場を1室ずつ照合する。VE等で変更した材料は承認記録と照合する"},
{no:"2-1-3",cat:"施工精度・納まり",desc:"各部の施工精度および取り合い・納まりが適切か",point:"異種材料の取り合い部（サッシ廻り・設備開口廻り等）は漏水リスクが高いため重点的に確認する"},
{no:"2-1-4",cat:"隠蔽部の確認",desc:"明視できない部分は報告書・試験成績書・記録写真・監督員資料により確認されているか",point:"天井裏・壁内・床下等の隠蔽部は検査時に確認できないため、施工中の写真記録との照合が必須"},
{no:"2-1-5",cat:"後片付け・清掃",desc:"建物周囲および内部の後片付け・清掃が完了しているか",point:"美装（専門清掃）完了後に検査を実施する。窓枠の隅・換気口内部・PS内等の清掃忘れに注意する"}
]},
{nm:"2-2 工事種別検査",items:[
{no:"2-2-1",cat:"地業工事",desc:"杭長・杭径・本数・支持力の記録確認",point:"支持層到達の確認記録（杭打ち記録・載荷試験結果）を照合する。設計GL との差異がないか確認"},
{no:"2-2-2",cat:"鉄筋工事",desc:"鉄筋の強度・配筋状態の記録確認",point:"ミルシート（鋼材試験証明書）と配筋検査写真を照合する。かぶり厚さの最小値に注意"},
{no:"2-2-3",cat:"コンクリート工事",desc:"調合・強度試験結果の確認／型枠精度／打放し面の仕上がり",point:"材齢28日の圧縮強度試験全数が設計基準強度以上であることを確認する。1本でも下回る場合は構造設計者と協議"},
{no:"2-2-4",cat:"鉄骨工事",desc:"材質・強度の試験成績書確認／接合部の精度・検査記録",point:"超音波探傷検査（UT）の合格率と不合格箇所の補修記録を確認する。高力ボルトのトルク管理記録も照合"},
{no:"2-2-5",cat:"組積工事",desc:"目地の充填状態",point:"目地モルタルの充填不足はひび割れの原因となる。指触や打診で確認する"},
{no:"2-2-6",cat:"防水工事",desc:"漏水の有無（散水試験等）／シール部の接着状態",point:"屋上防水は水張り試験（48時間以上）の実施を推奨する。シーリングは3面接着になっていないか確認"},
{no:"2-2-7",cat:"木工事",desc:"材質の適否・傷の有無",point:"含水率が基準値（15%以下等）を満たしているか確認する。表面の傷・割れは照明を斜めに当てて確認"},
{no:"2-2-8",cat:"屋根工事",desc:"漏水の有無／屋根材の固定状態",point:"屋根材の重ね代・水返し・谷部の施工を重点確認する。強風時の飛散防止対策（ビス固定間隔等）も確認"},
{no:"2-2-9",cat:"金属工事",desc:"手摺等の固定度は十分か",point:"手摺は体重をかけてガタツキがないか実際に触って確認する。アンカー部の増し締めと防錆処理も確認"},
{no:"2-2-10",cat:"左官工事",desc:"仕上り面の不陸・こてむら・亀裂・浮き等",point:"打診棒で全面打診し浮きを確認する。ひび割れはヘアクラック（0.2mm以下）でも記録に残す"},
{no:"2-2-11",cat:"建具工事",desc:"開閉・建付け・戸締まり／防水処理／鍵・防犯ロックの動作",point:"全ての扉・窓を実際に開閉し、異音・引っかかりがないか確認する。防火戸は閉鎖速度も確認"},
{no:"2-2-12",cat:"ガラス工事",desc:"固定状態／ガラス種類が仕様どおりか",point:"刻印やラベルで防火ガラス・合わせガラス等の種類を現物確認する。エッジクリアランスも確認"},
{no:"2-2-13",cat:"塗装工事",desc:"塗り回数／刷毛むら・色むら・たまり・垂れ等",point:"塗膜厚を電磁式膜厚計で測定する。特に鉄部の防錆塗装は膜厚不足が錆の原因となる"},
{no:"2-2-14",cat:"内装工事",desc:"床材の不陸・浮き・目違い／クロスのしわ・ふくれ／塗装面の不良",point:"照明を消して懐中電灯で斜め照射すると、壁面の不陸やクロスの浮きが発見しやすい"},
{no:"2-2-15",cat:"タイル工事",desc:"ひび割れ・目地の充填不良・浮きの有無",point:"全数打診検査を行い浮き率を算出する。外壁タイルの浮き率は一般に1%以下が合格基準"},
{no:"2-2-16",cat:"排水工事",desc:"排水管の通水確認",point:"全系統で同時排水し、逆流・溢水がないか確認する。排水管の勾配不足は将来の詰まりの原因となる"},
{no:"2-2-17",cat:"外構工事",desc:"舗装・駐車場・植栽・フェンス等／排水勾配",point:"舗装面の水勾配を実際に散水して確認する。水たまりが生じる箇所は排水不良の兆候"},
{no:"2-2-18",cat:"雑工事",desc:"その他附帯工事の適否",point:"表示板・銘板・避難経路図・消火器配置図等のサイン類の設置状態と内容の正確性を確認する"}
]}
]},
{ch:"第3章",tt:"電気設備工事の検査",icon:"⚡",secs:[
{nm:"3-1 共通事項",items:[

let activeTab = 0;

function renderApp() {
  const nav = document.getElementById('tabNav');
  const panels = document.getElementById('tabPanels');
  let navH = '', panH = '', tot = 0;

  DATA.forEach((ch, ci) => {
    let cnt = 0;
    ch.secs.forEach(s => cnt += s.items.length);
    tot += cnt;

    // Tab button
    navH += `<button class="tab-btn${ci===0?' active':''}" id="tb_${ci}" onclick="switchTab(${ci})">
      <span class="tb-status untouched" id="tbs_${ci}"></span>
      ${ch.icon} ${ch.ch}<span class="tb-badge">${cnt}</span>
    </button>`;

    // Panel
    panH += `<div class="tab-panel${ci===0?' active':''}" id="tp_${ci}">`;

    ch.secs.forEach(sec => {
      if (sec.nm) panH += `<div class="sec-hd">${sec.nm}</div>`;

      sec.items.forEach(item => {
        const uid = item.no.replace(/[-.]/g,'_');
        panH += `<div class="item-card" id="card_${uid}">
          <div class="ic-top">
            <span class="ic-no">${item.no}</span>
            <div class="ic-body">
              <div class="ic-cat">${item.cat}</div>
              <div class="ic-desc">${item.desc}</div>
              <div class="ic-point">${item.point}</div>
              <div class="ic-judge">
                <div class="rg" id="rg_${uid}">
                  <label id="lb_${uid}_p" onclick="setJ('${uid}','合格')"><input type="radio" name="j_${uid}" value="合格"><span>✔ 合格</span></label>
                  <label id="lb_${uid}_f" onclick="setJ('${uid}','不合格')"><input type="radio" name="j_${uid}" value="不合格"><span>✘ 不合格</span></label>
                  <label id="lb_${uid}_n" onclick="setJ('${uid}','対象外')"><input type="radio" name="j_${uid}" value="対象外"><span>— 対象外</span></label>
                </div>
              </div>
              <div class="ic-remarks">
                <label>備考：</label>
                <textarea id="r_${uid}" placeholder="備考・指摘内容を入力"></textarea>
              </div>
            </div>
          </div>
        </div>`;
      });
    });
    panH += `</div>`;
  });

  nav.innerHTML = navH;
  panels.innerHTML = panH;
  document.getElementById('stot').textContent = tot;
  updateProgress();
}

function switchTab(idx) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  document.querySelectorAll('.tab-panel').forEach((p,i) => p.classList.toggle('active', i===idx));
  activeTab = idx;
}

function setJ(uid, val) {
  const rg = document.getElementById(`rg_${uid}`);
  rg.querySelectorAll('label').forEach(l => l.classList.remove('sel-pass','sel-fail','sel-na'));
  const radio = rg.querySelector(`input[value="${val}"]`);
  if (radio) radio.checked = true;
  if (val==='合格') document.getElementById(`lb_${uid}_p`).classList.add('sel-pass');
  else if (val==='不合格') document.getElementById(`lb_${uid}_f`).classList.add('sel-fail');
  else if (val==='対象外') document.getElementById(`lb_${uid}_n`).classList.add('sel-na');
  updateProgress();
  updateTabStatus();
}

function getJ(uid) {
  const rg = document.getElementById(`rg_${uid}`);
  const checked = rg?.querySelector('input:checked');
  return checked ? checked.value : '';
}

function updateProgress() {
  let pass=0,fail=0,na=0,pending=0,total=0;
  DATA.forEach(ch => ch.secs.forEach(s => s.items.forEach(item => {
    total++;
    const v = getJ(item.no.replace(/[-.]/g,'_'));
    if(v==='合格')pass++; else if(v==='不合格')fail++; else if(v==='対象外')na++; else pending++;
  })));
  const judged=pass+fail+na;
  const pct=total?Math.round(judged/total*100):0;
  document.getElementById('pbar').style.width=pct+'%';
  document.getElementById('ptxt').textContent=pct+'%';
  document.getElementById('sp').textContent=`✔ 合格: ${pass}`;
  document.getElementById('sf').textContent=`✘ 不合格: ${fail}`;
  document.getElementById('sn').textContent=`— 対象外: ${na}`;
  document.getElementById('su').textContent=`○ 未判定: ${pending}`;
}

function updateTabStatus() {
  DATA.forEach((ch, ci) => {
    let total=0, judged=0, hasFail=false;
    ch.secs.forEach(s => s.items.forEach(item => {
      total++;
      const v = getJ(item.no.replace(/[-.]/g,'_'));
      if(v) judged++;
      if(v==='不合格') hasFail=true;
    }));
    const dot = document.getElementById(`tbs_${ci}`);
    dot.className = 'tb-status';
    if(judged===0) dot.classList.add('untouched');
    else if(judged===total && !hasFail) dot.classList.add('complete');
    else dot.classList.add('incomplete');
  });
}

function setAllPass() {
  if(!confirm('全項目を「合格」に設定しますか？'))return;
  DATA.forEach(ch=>ch.secs.forEach(s=>s.items.forEach(item=>{
    setJ(item.no.replace(/[-.]/g,'_'),'合格');
  })));
  showToast('全項目を「合格」に設定しました');
}

function resetAll() {
  if(!confirm('全入力をリセットしますか？'))return;
  DATA.forEach(ch=>ch.secs.forEach(s=>s.items.forEach(item=>{
    const uid=item.no.replace(/[-.]/g,'_');
    const rg=document.getElementById(`rg_${uid}`);
    rg.querySelectorAll('input').forEach(r=>r.checked=false);
    rg.querySelectorAll('label').forEach(l=>l.classList.remove('sel-pass','sel-fail','sel-na'));
    document.getElementById(`r_${uid}`).value='';
  })));
  document.querySelectorAll('.pinfo input').forEach(el=>el.value='');
  updateProgress();
  updateTabStatus();
  showToast('全入力をリセットしました');
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)}

// ===================================================================
//  COLLECT DATA
// ===================================================================
function collectData(){
  const info={
    projectName:document.getElementById('f_pn').value,
    constructionPeriod:document.getElementById('f_cp').value,
    inspectionDate:document.getElementById('f_id').value,
    deliveryDate:document.getElementById('f_dd').value,
    managerName:document.getElementById('f_mn').value,
    inspectorName:document.getElementById('f_in').value
  };
  const rows=[];
  DATA.forEach(ch=>ch.secs.forEach(sec=>sec.items.forEach(item=>{
    const uid=item.no.replace(/[-.]/g,'_');
    rows.push({chapter:ch.ch,chapterTitle:ch.tt,section:sec.nm,no:item.no,category:item.cat,description:item.desc,point:item.point,judgment:getJ(uid),remarks:document.getElementById(`r_${uid}`)?.value||''});
  })));
  return{info,rows};
}

// ===================================================================
//  CSV EXPORT
// ===================================================================
function exportCSV(){
  const{info,rows}=collectData();
  const B='\uFEFF';
  let c=B;
  c+=`工事名,${esc(info.projectName)}\n工期,${esc(info.constructionPeriod)}\n社内検査日,${esc(info.inspectionDate)}\n引渡日,${esc(info.deliveryDate)}\n工事担当者名,${esc(info.managerName)}\n検査責任者名,${esc(info.inspectorName)}\n\n`;
  c+=`章,章タイトル,節,No.,検査区分,検査内容,検査ポイント,判定,備考\n`;
  rows.forEach(r=>{c+=[r.chapter,r.chapterTitle,r.section,r.no,r.category,r.description,r.point,r.judgment,r.remarks].map(esc).join(',')+'\n'});
  const blob=new Blob([c],{type:'text/csv;charset=utf-8;'});
  saveAs(blob,`社内検査_${info.projectName||'無題'}_${todayStr()}.csv`);
  showToast('CSVファイルを出力しました');
}
function esc(v){v=String(v??'');return(v.includes(',')||v.includes('"')||v.includes('\n'))?'"'+v.replace(/"/g,'""')+'"':v}

// ===================================================================
//  EXCEL EXPORT
// ===================================================================
async function exportExcel(){
  showToast('Excel生成中...');
  const{info,rows}=collectData();
  const wb=new ExcelJS.Workbook();wb.creator='社内検査アプリ';wb.created=new Date();
  const hFill={type:'pattern',pattern:'solid',fgColor:{argb:'FF1A5276'}};
  const hFont={bold:true,color:{argb:'FFFFFFFF'},size:9,name:'Meiryo'};
  const sFill={type:'pattern',pattern:'solid',fgColor:{argb:'FFEAF2F8'}};
  const pFill={type:'pattern',pattern:'solid',fgColor:{argb:'FFFFF9E6'}};
  const okFill={type:'pattern',pattern:'solid',fgColor:{argb:'FFD5F5E3'}};
  const ngFill={type:'pattern',pattern:'solid',fgColor:{argb:'FFFADBD8'}};
  const naFill2={type:'pattern',pattern:'solid',fgColor:{argb:'FFFDEBD0'}};
  const bdr={top:{style:'thin',color:{argb:'FFDCE1E6'}},left:{style:'thin',color:{argb:'FFDCE1E6'}},bottom:{style:'thin',color:{argb:'FFDCE1E6'}},right:{style:'thin',color:{argb:'FFDCE1E6'}}};
  const df={name:'Meiryo',size:8};

  const ws=wb.addWorksheet('社内検査帳票',{pageSetup:{paperSize:9,orientation:'landscape',fitToPage:true,fitToWidth:1,fitToHeight:0,margins:{left:.4,right:.4,top:.5,bottom:.4,header:.25,footer:.2}}});

  // Title
  ws.mergeCells('A1:I1');
  const tc=ws.getCell('A1');tc.value='建築工事 完成時 社内検査項目【完全版】';tc.font={bold:true,size:14,name:'Meiryo',color:{argb:'FF1A5276'}};tc.alignment={horizontal:'center',vertical:'middle'};ws.getRow(1).height=32;
  ws.mergeCells('A2:I2');ws.getCell('A2').value='── 引渡し許可判定 統合チェックリスト ──';ws.getCell('A2').font={size:9,name:'Meiryo',color:{argb:'FF7F8C8D'}};ws.getCell('A2').alignment={horizontal:'center'};

  // Info
  const il=['工事名','工期','社内検査日','引渡日','工事担当者名','検査責任者名'];
  const iv=[info.projectName,info.constructionPeriod,info.inspectionDate,info.deliveryDate,info.managerName,info.inspectorName];
  for(let i=0;i<il.length;i++){
    const r=4+Math.floor(i/2),c=(i%2===0)?1:6;
    ws.getCell(r,c).value=il[i]+'：';ws.getCell(r,c).font={bold:true,size:8,name:'Meiryo'};
    ws.mergeCells(r,c+1,r,c+2);const vc=ws.getCell(r,c+1);vc.value=iv[i];vc.font=df;vc.border={bottom:{style:'thin',color:{argb:'FF1A5276'}}};
  }

  // Stats
  let ps=0,fl=0,na2=0,pd=0;
  rows.forEach(r=>{if(r.judgment==='合格')ps++;else if(r.judgment==='不合格')fl++;else if(r.judgment==='対象外')na2++;else pd++});
  const sr=7;
  ws.getCell(sr,1).value='【判定集計】';ws.getCell(sr,1).font={bold:true,size:8,name:'Meiryo'};
  ws.getCell(sr,2).value=`合格:${ps}`;ws.getCell(sr,2).font={...df,color:{argb:'FF1E8449'}};
  ws.getCell(sr,3).value=`不合格:${fl}`;ws.getCell(sr,3).font={...df,color:{argb:'FFC0392B'}};
  ws.getCell(sr,4).value=`対象外:${na2}`;ws.getCell(sr,4).font={...df,color:{argb:'FFD68910'}};
  ws.getCell(sr,5).value=`未判定:${pd}`;ws.getCell(sr,5).font={...df,color:{argb:'FF666666'}};
  ws.getCell(sr,6).value=`全${rows.length}項目`;ws.getCell(sr,6).font={bold:true,...df};

  // Header
  const hr=9;
  const heads=['No.','章','節','検査区分','検査内容','検査ポイント','判定','備考',''];
  const cw=[7,8,14,18,40,36,8,24,2];
  heads.forEach((h,i)=>{const cell=ws.getCell(hr,i+1);cell.value=h==='─'?'':h;cell.fill=hFill;cell.font=hFont;cell.alignment={horizontal:'center',vertical:'middle',wrapText:true};cell.border=bdr});
  ws.getRow(hr).height=22;
  cw.forEach((w,i)=>{ws.getColumn(i+1).width=w});

  // Data
  let r=hr+1,prev='';
  rows.forEach(row=>{
    if(row.chapter!==prev){
      ws.mergeCells(r,1,r,8);const cc=ws.getCell(r,1);cc.value=`${row.chapter}　${row.chapterTitle}`;cc.fill=sFill;cc.font={bold:true,size:9,name:'Meiryo',color:{argb:'FF1A5276'}};cc.alignment={vertical:'middle'};cc.border=bdr;ws.getRow(r).height=20;prev=row.chapter;r++;
    }
    const rh=Math.max(36,Math.ceil(Math.max(row.description.length,row.point.length)/30)*13);
    ws.getRow(r).height=rh;
    const vals=[row.no,row.chapter,row.section,row.category,row.description,row.point,row.judgment,row.remarks];
    vals.forEach((v,i)=>{
      const cell=ws.getCell(r,i+1);cell.value=v;cell.font=df;cell.alignment={vertical:'top',wrapText:true};cell.border=bdr;
      if(i===0)cell.alignment.horizontal='center';
      if(i===5){cell.fill=pFill;cell.font={...df,color:{argb:'FF7D6608'}};}
    });
    const jc=ws.getCell(r,7);jc.alignment={horizontal:'center',vertical:'middle'};
    if(row.judgment==='合格'){jc.fill=okFill;jc.font={...df,bold:true,color:{argb:'FF1E8449'}}}
    else if(row.judgment==='不合格'){jc.fill=ngFill;jc.font={...df,bold:true,color:{argb:'FFC0392B'}}}
    else if(row.judgment==='対象外'){jc.fill=naFill2;jc.font={...df,color:{argb:'FFD68910'}}}
    r++;
  });

  // Signature
  r+=2;
  ws.mergeCells(r,1,r,3);ws.getCell(r,1).value='引渡し許可判定';ws.getCell(r,1).font={bold:true,size:10,name:'Meiryo'};r++;
  ['判定結果：','判定日：','承認者：'].forEach(lb=>{ws.getCell(r,1).value=lb;ws.getCell(r,1).font={bold:true,size:8,name:'Meiryo'};ws.mergeCells(r,2,r,4);ws.getCell(r,2).border={bottom:{style:'thin'}};r++});
  r++;ws.getCell(r,6).value='承認印';ws.getCell(r,6).font={size:7,name:'Meiryo',color:{argb:'FF999999'}};ws.getCell(r,6).alignment={horizontal:'center'};
  ws.mergeCells(r,6,r+3,8);for(let i=0;i<=3;i++)for(let j=6;j<=8;j++)ws.getCell(r+i,j).border=bdr;

  ws.headerFooter.oddHeader='&L&7建築工事 完成時 社内検査項目【完全版】&R&7&D';
  ws.headerFooter.oddFooter='&C&7&P / &N';

  const buf=await wb.xlsx.writeBuffer();
  saveAs(new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}),`社内検査帳票_${info.projectName||'無題'}_${todayStr()}.xlsx`);
  showToast('Excelファイルを出力しました');
}

function todayStr(){const d=new Date();return`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`}
